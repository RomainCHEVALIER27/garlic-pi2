<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        /* On bloque tout mouvement et on supprime les marges */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { 
            height: 100%; width: 100%; 
            background: #000; overflow: hidden; 
            position: fixed; /* Force la page à rester fixe */
            top: 0; left: 0;
        }

        /* La grille prend 100% de la fenêtre visible */
        .container {
            display: grid;
            grid-template-columns: 50vw 50vw;
            grid-template-rows: 50vh 50vh;
            height: 100vh;
            width: 100vw;
        }

        .zone { 
            width: 100%; height: 100%; 
            border: 1px solid #111; 
            overflow: hidden; 
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #000; color: white;
            text-align: center;
        }

        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Style Zone 3 (Ton bloc Technicien) */
        .titre-adrn { font-size: 2vw; color: white; margin-bottom: 5px; }
        .nom-tech { font-size: 1.5vw; color: #00FF00; }
        .horloge-tech { font-size: 4vw; color: white; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="zone">
            <iframe src="https://romainchevalier27.github.io/Info/"></iframe>
        </div>
        
        <div class="zone">
            <iframe src="https://romainchevalier27.github.io/Horloge-Meteo/"></iframe>
        </div>
        
        <div class="zone">
            <h1 class="titre-adrn">PROJET ADRN - AFFICHAGE DYNAMIQUE</h1>
            <p class="nom-tech">Technicien : Romain Chevalier</p>
            <div id="reloge" class="horloge-tech">00:00:00</div>
        </div>
        
        <div class="zone" style="color: #222;">ZONE LIBRE</div>
    </div>

    <script>
        function clock() {
            document.getElementById('reloge').innerText = new Date().toLocaleTimeString('fr-FR');
        }
        setInterval(clock, 1000); clock();
    </script>
</body>
</html>
