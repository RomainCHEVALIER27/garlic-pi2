<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Garlic Pi 2 - 4 Affichages</title>
    <style>
        /* Reset pour le plein écran */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* La Grille Magique (2 colonnes, 2 lignes) */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%;
            height: 100%;
            gap: 10px; /* Espace entre les cases */
            padding: 10px;
        }

        /* Style de chaque zone d'affichage */
        .zone {
            background-color: #1a1a1a;
            border: 2px solid #2ecc71; /* Bordure verte Garlic */
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .zone h2 { font-size: 1.5vw; color: #2ecc71; margin-bottom: 10px; }
        .zone .data { font-size: 3vw; font-weight: bold; }

        /* Couleurs différentes pour bien voir les 4 zones */
        .z1 { border-color: #e74c3c; } /* Rouge */
        .z2 { border-color: #3498db; } /* Bleu */
        .z3 { border-color: #f1c40f; } /* Jaune */
        .z4 { border-color: #2ecc71; } /* Vert */

    </style>
</head>
<body>

    <div class="grid-container">
        <div class="zone z1">
            <h2>AFFICHAGE 1</h2>
            <div class="data">TEMPÉRATURE</div>
        </div>
        <div class="zone z2">
            <h2>AFFICHAGE 2</h2>
            <div class="data">HUMIDITÉ</div>
        </div>
        <div class="zone z3">
            <h2>AFFICHAGE 3</h2>
            <div class="data">SYSTÈME</div>
        </div>
        <div class="zone z4">
            <h2>AFFICHAGE 4</h2>
            <div class="data">GARLIC PI 2</div>
        </div>
    </div>

</body>
</html>
