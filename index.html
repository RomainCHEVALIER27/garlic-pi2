<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Multi-Zone Fixe ADRN</title>
    <style>
        /* On bloque tout pour éviter les barres de défilement */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #000; overflow: hidden; 
        }
        /* Grille 2x2 qui prend tout l'écran */
        .container {
            display: grid;
            grid-template-columns: 50% 50%;
            grid-template-rows: 50% 50%;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
        }
        .zone { 
            width: 100%; height: 100%; 
            border: 1px solid #333; /* Bordure fine pour délimiter les zones */
            box-sizing: border-box;
            background: #050505;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .vide { 
            display: flex; align-items: center; justify-content: center; 
            color: #444; font-family: sans-serif; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="zone">
            <iframe src="https://romainchevalier27.github.io/Info/"></iframe>
        </div>
        
        <div class="zone">
            <iframe src="https://romainchevalier27.github.io/Horloge-Meteo/"></iframe>
        </div>
        
        <div class="zone">
            <iframe src="https://romainchevalier27.github.io/Test/"></iframe>
        </div>
        
        <div class="zone vide">
            Zone Libre
        </div>
    </div>
</body>
</html>
