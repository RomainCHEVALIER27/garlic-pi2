<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garlic Pi 2 - Dashboard</title>
    <style>
        /* 1. Reset total pour supprimer les bordures blanches */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 2. On force le site à faire exactement la taille de l'écran */
        html, body {
            width: 100vw;
            height: 100vh;
            background-color: #000; /* Fond noir pour éviter les flashs blancs */
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Interdit le scroll (barres de défilement) */
        }

        /* 3. Le conteneur qui centre tout le contenu */
        .main-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centre verticalement */
            align-items: center;     /* Centre horizontalement */
            border: 5px solid #2ecc71; /* Cadre vert pour voir les limites de l'écran */
        }

        h1 {
            font-size: 5vw; /* Taille de texte qui s'adapte à la largeur */
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .logo-placeholder {
            width: 60%;
            height: 50%;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            font-weight: bold;
            font-size: 2rem;
            border: 2px dashed #666;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 1.2rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>Garlic Pi 2</h1>
        
        <div class="logo-placeholder">
            VOTRE LOGO ICI
        </div>

        <div class="footer">
            Affichage 16/10 - Mode Kiosk Actif
        </div>
    </div>

</body>
</html>
