<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garlic Pi 2 - Dashboard</title>
    <style>
        /* Supprime les marges blanches autour du site */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000; /* Fond noir pour le look pro */
            color: white;
            font-family: sans-serif;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Empêche de scroller */
        }

        .container {
            width: 95%;  /* On laisse 5% de marge pour la sécurité du cadrage */
            height: 95%;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            text-align: center;
        }

        img {
            max-width: 100%;
            max-height: 80%; /* Le logo prend la place sans dépasser */
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GARLIC PI 2 - PROJET 4EME ECRAN</h1>
        <img src="ton-logo.png" alt="Garlic Logo">
        <p>Statut : Connecté - Résolution 16/10</p>
    </div>
</body>
</html>
