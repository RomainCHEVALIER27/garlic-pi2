<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Garlic Pi 2 - Dashboard 4 Zones</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100vw; height: 100vh; background-color: #000; overflow: hidden; font-family: sans-serif; color: white; }

        /* Grille 2x2 */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%;
            height: 100%;
            gap: 10px;
            padding: 10px;
        }

        .zone {
            background-color: #111;
            border: 2px solid #2ecc71; /* Vert Garlic */
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Style des textes Garlic */
        .zone h2 { font-size: 1.5vw; color: #2ecc71; margin-bottom: 10px; }
        .zone p { font-size: 2vw; font-weight: bold; }

        /* Zone 4 : Le Diaporama */
        #media-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #media-container img, #media-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="zone">
            <h2>PROJET</h2>
            <p>GARLIC PI 2</p>
        </div>

        <div class="zone">
            <h2>STATUT</h2>
            <p>EN LIGNE</p>
        </div>

        <div class="zone">
            <h2>SYSTÈME</h2>
            <p>PI 2 - 16/10</p>
        </div>

        <div class="zone" style="border-color: #f1c40f;">
            <div id="media-container">
                <img id="dynamic-content" src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=800" alt="Media">
            </div>
        </div>
    </div>

    <script>
        // Liste de tes images ou vidéos sur GitHub
        const playlist = [
            "https://images.unsplash.com/photo-1518770660439-4636190af475?w=800", // Image 1
            "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800", // Image 2
            "ton-video.mp4" // Si tu as une vidéo sur ton GitHub
        ];

        let index = 0;
        const mediaElement = document.getElementById('dynamic-content');

        function changeMedia() {
            index = (index + 1) % playlist.length;
            mediaElement.src = playlist[index];
        }

        // Change toutes les 5 secondes (5000ms)
        setInterval(changeMedia, 5000);
    </script>
</body>
</html>
