<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <style>
        /* FORCE LE PLEIN ÉCRAN AU NIVEAU DU NAVIGATEUR */
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }
        
        html, body { 
            height: 100vh; width: 100vw; 
            background: #000; 
            overflow: hidden !important; /* Supprime les barres de défilement */
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
        }

        .container {
            display: grid;
            grid-template-columns: 50% 50%;
            grid-template-rows: 50% 50%;
            /* On utilise 100vh pour prendre TOUTE la hauteur disponible */
            height: 100vh; 
            width: 100vw;
            border: none;
        }

        .zone { 
            width: 100%; height: 100%; 
            border: 1px solid #1a1a1a; 
            background: #000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; pointer-events: none; }

        /* Style Zone 3 (Ton bloc Technicien) */
        .titre-adrn { font-size: 2vw; color: white; margin-bottom: 5px; font-family: sans-serif; text-align: center; }
        .nom-tech { font-size: 1.5vw; color: #00FF00; font-family: sans-serif; }
        .horloge-tech { font-size: 5vw; color: white; font-weight: bold; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <div class="zone">
            <iframe src="https://romainchevalier27.github.io/Info/"></iframe>
        </div>
        
        <div class="zone">
            <iframe src="https://romainchevalier27.github.io/Horloge-Meteo/"></iframe>
        </div>
        
        <div class="zone">
            <h1 class="titre-adrn">PROJET ADRN - AFFICHAGE DYNAMIQUE</h1>
            <p class="nom-tech">Technicien : Romain Chevalier</p>
            <div id="reloge" class="horloge-tech">00:00:00</div>
        </div>
        
        <div class="zone" style="color: #222; font-family: sans-serif;">ZONE LIBRE</div>
    </div>

    <script>
        function clock() {
            const d = new Date();
            document.getElementById('reloge').innerText = d.getHours().toString().padStart(2,'0') + ":" + 
                                                        d.getMinutes().toString().padStart(2,'0') + ":" + 
                                                        d.getSeconds().toString().padStart(2,'0');
        }
        setInterval(clock, 1000); clock();
    </script>
</body>
</html>
