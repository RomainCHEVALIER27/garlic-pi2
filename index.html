<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        /* Force la suppression de TOUTES les marges et barres */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            height: 100vh; width: 100vw; 
            background: #000; overflow: hidden; 
            font-family: sans-serif; cursor: none; /* Cache la souris */
        }

        .container {
            display: grid;
            grid-template-columns: 50% 50%;
            grid-template-rows: 50% 50%;
            height: 100vh; width: 100vw;
        }

        .zone { 
            width: 100%; height: 100%; 
            border: 1px solid #111; 
            overflow: hidden; 
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #000; color: white;
        }

        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Style Zone 3 (Ton bloc Technicien) */
        .titre-adrn { font-size: 2vw; color: white; margin-bottom: 10px; }
        .nom-tech { font-size: 1.5vw; color: #aaa; }
        .horloge-tech { font-size: 4vw; color: #00FF00; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="zone">
            <iframe src="https://romainchevalier27.github.io/Info/"></iframe>
        </div>
        
        <div class="zone">
            <iframe src="https://romainchevalier27.github.io/Horloge-Meteo/"></iframe>
        </div>
        
        <div class="zone">
            <h1 class="titre-adrn">PROJET ADRN - AFFICHAGE DYNAMIQUE</h1>
            <p class="nom-tech">Technicien : Romain Chevalier</p>
            <div id="reloge" class="horloge-tech">00:00:00</div>
        </div>
        
        <div class="zone" style="color: #222;">ZONE LIBRE</div>
    </div>

    <script>
        function clock() {
            document.getElementById('reloge').innerText = new Date().toLocaleTimeString();
        }
        setInterval(clock, 1000); clock();
    </script>
</body>
</html>
