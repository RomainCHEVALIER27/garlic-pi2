<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Garlic Pi 2 - Dashboard Final 10s</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100vw; height: 100vh; 
            background-color: #000; overflow: hidden; 
        }

        /* Grille 2x2 */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%; height: 100%;
            gap: 10px; padding: 10px;
        }

        /* Style des iframes (Zones 1, 2, 3) */
        iframe {
            width: 100%; height: 100%;
            border: 2px solid #2ecc71;
            border-radius: 10px;
            background-color: #111;
        }

        /* Zone 4 : Picsum Dynamique */
        .zone-picsum {
            width: 100%; height: 100%;
            border: 2px solid #f1c40f;
            border-radius: 10px;
            overflow: hidden;
            background-color: #000;
        }
        
        #picsum-img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <iframe src="https://romainchevalier27.github.io/Info/" scrolling="no"></iframe>

        <iframe src="https://romainchevalier27.github.io/Horloge-Meteo/" scrolling="no"></iframe>

        <iframe src="https://romainchevalier27.github.io/Generique/" scrolling="no"></iframe>

        <div class="zone-picsum">
            <img id="picsum-img" src="https://picsum.photos/1680/1050" alt="Picsum Image">
        </div>
    </div>

    <script>
        const imgElement = document.getElementById('picsum-img');

        function updateImage() {
            // Le timestamp évite que le Pi garde la même image en cache
            const newUrl = "https://picsum.photos/1680/1050?t=" + new Date().getTime();
            imgElement.src = newUrl;
        }

        // --- CHANGEMENT TOUTES LES 10 SECONDES ---
        setInterval(updateImage, 10000); 

        // Premier chargement forcé au démarrage
        updateImage();
    </script>
</body>
</html>
