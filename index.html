<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Garlic Pi 2 - Dashboard Complet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100vw; height: 100vh; background-color: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%;
            height: 100%;
            gap: 15px;
            padding: 15px;
        }

        .zone {
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 2px solid #2ecc71;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Styles des Widgets */
        .title { color: #2ecc71; font-size: 1.2vw; text-transform: uppercase; margin-bottom: 10px; }
        .clock { font-size: 4vw; font-weight: bold; }
        .temp { font-size: 3vw; color: #f1c40f; }
        .info { font-size: 1.5vw; }

        /* Zone 4 Dynamique */
        #media-zone { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="zone">
            <div class="title">Heure Locale</div>
            <div id="clock" class="clock">00:00:00</div>
        </div>

        <div class="zone">
            <div class="title">Météo</div>
            <div class="temp">22°C</div>
            <div class="info">Ensoleillé</div>
        </div>

        <div class="zone">
            <div class="title">Utilisateur</div>
            <div class="info">GARLIC PI 2</div>
            <div style="color: #888; margin-top:10px;">Système OK</div>
        </div>

        <div class="zone" style="border-color: #3498db;">
            <img id="media-zone" src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500" alt="Media">
        </div>
    </div>

    <script>
        // 1. Script de l'horloge
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Script de changement de l'image (Zone 4)
        const images = [
            "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500",
            "https://images.unsplash.com/photo-1518770660439-4636190af475?w=500",
            "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=500"
        ];
        let i = 0;
        setInterval(() => {
            i = (i + 1) % images.length;
            document.getElementById('media-zone').src = images[i];
        }, 5000);
    </script>
</body>
</html>
