<!DOCTYPE html>
<html lang="fr" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <title>Garlic Pi 2 - Optimized</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100vw; height: 100vh; 
            background-color: #000; overflow: hidden; 
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%; height: 100%;
            gap: 10px; padding: 10px;
        }

        iframe {
            width: 100%; height: 100%;
            border: 2px solid #2ecc71;
            border-radius: 10px;
            background-color: #111;
        }

        .zone-picsum {
            width: 100%; height: 100%;
            border: 2px solid #f1c40f;
            border-radius: 10px;
            overflow: hidden;
            background-color: #000;
        }
        
        #picsum-img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <iframe src="https://romainchevalier27.github.io/Info/" scrolling="no"></iframe>
        <iframe src="https://romainchevalier27.github.io/Horloge-Meteo/" scrolling="no"></iframe>
        <iframe src="https://romainchevalier27.github.io/Generique/" scrolling="no"></iframe>

        <div class="zone-picsum">
            <img id="picsum-img" src="https://picsum.photos/800/600" alt="Picsum">
        </div>
    </div>

    <script>
        const imgElement = document.getElementById('picsum-img');

        function updateImage() {
            // Taille 800x600 pour soulager le processeur du Pi 2
            const newUrl = "https://picsum.photos/800/600?t=" + new Date().getTime();
            imgElement.src = newUrl;
        }

        // Changement toutes les 20 secondes (20000ms)
        setInterval(updateImage, 20000);
        updateImage();
    </script>
</body>
</html>
