<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Playlist ADRN</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: black; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>
    <iframe id="display-frame" src=""></iframe>

    <script>
        const pages = [
            { url: "https://romainchevalier27.github.io/Info/", time: 10000 },
            { url: "https://romainchevalier27.github.io/Horloge-Meteo/", time: 20000 }
        ];
        let index = 0;

        function startPlaylist() {
            const frame = document.getElementById('display-frame');
            
            function next() {
                const currentPage = pages[index];
                frame.src = currentPage.url;
                
                console.log("Affichage de : " + currentPage.url + " pendant " + currentPage.time + "ms");
                
                setTimeout(() => {
                    index = (index + 1) % pages.length;
                    next();
                }, currentPage.time);
            }
            
            next();
        }

        window.onload = startPlaylist;
    </script>
</body>
</html>
